<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eeeeee"/>
      <stop offset="100%" stop-color="#d8d8d8"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.08"/></feComponentTransfer>
      <feBlend mode="overlay" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1600" height="1100" fill="url(#g)"/>
  <rect width="1600" height="1100" filter="url(#noise)" opacity=".45"/>
  <rect x="90" y="90" width="1420" height="920" rx="0" fill="none" stroke="#777777" stroke-opacity=".28" stroke-width="2"/>
  <text x="120" y="565" fill="#777777" font-family="Arial, sans-serif" font-size="110" font-weight="800" letter-spacing="-6">好伴公寓</text>
  <text x="124" y="645" fill="#777777" font-family="Arial, sans-serif" font-size="34" font-weight="400" opacity=".82">Logo System</text>
</svg>